services:
  - type: web
    name: likha-ph
    env: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /up
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        fromService:
          type: web
          name: likha-ph
          property: url
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: info
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: FILESYSTEM_DISK
        value: public
      - key: RUN_MIGRATIONS
        value: "1"
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: likha-ph-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: likha-ph-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: likha-ph-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: likha-ph-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: likha-ph-db
          property: password

databases:
  - name: likha-ph-db
    plan: free

